services:
  db:
    image: postgres:16
    container_name: goalkeeper-db
    environment:
      POSTGRES_DB: goalkeeper
      POSTGRES_USER: goalkeeper
      POSTGRES_PASSWORD: goalkeeper
    ports:
      - "5432:5432"
    volumes:
      - goalkeeper_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goalkeeper"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  goalkeeper_pg:
