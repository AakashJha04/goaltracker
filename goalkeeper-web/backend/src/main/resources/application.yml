spring:
  application:
    name: goalkeeper
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/goalkeeper}
    username: ${DB_USER:goalkeeper}
    password: ${DB_PASSWORD:goalkeeper}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none        # schema owned by Flyway
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  cache:
    # "simple" (in-memory, zero setup) by default. Set CACHE_TYPE=redis + REDIS_HOST
    # to cache dashboard stats in Redis instead — purely an optimization, the app
    # works identically either way.
    type: ${CACHE_TYPE:simple}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      # Redis is an optional cache backend (see spring.cache.type above) — its absence
      # shouldn't report the whole app as DOWN. Flip this on if you set CACHE_TYPE=redis.
      enabled: ${REDIS_HEALTH_ENABLED:false}

app:
  jwt:
    # 256-bit secret. OVERRIDE in production via env var.
    secret: ${JWT_SECRET:2f8b7c1e9a4d6f0b3e5c8a1d7f2b4e6c9a0d3f5b8c1e4a7d0f2b5e8c1a4d7f0b}
    access-token-ttl-seconds: 900          # 15 minutes
    refresh-token-ttl-seconds: 1209600     # 14 days
  cookie:
    refresh-name: refresh_token
    secure: ${COOKIE_SECURE:false}         # true behind HTTPS in production
    same-site: Lax
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  mail:
    # Off by default so the app runs with zero SMTP setup (reminders log to the
    # console instead). Set MAIL_ENABLED=true and spring.mail.* env vars to send real email.
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@goalkeeper.app}
